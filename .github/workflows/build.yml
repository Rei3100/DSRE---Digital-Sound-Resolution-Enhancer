name: Build DSRE Private

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'DSRE.py'
      - 'DSRE.spec'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Python 3.11 準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 依存インストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: requirements 検証 (UTF-16 bytes禁止)
        shell: pwsh
        run: |
          foreach ($f in @("requirements.txt", "requirements-dev.txt")) {
            $b = [System.IO.File]::ReadAllBytes($f)
            if ($b.Length -ge 4 -and $b[1] -eq 0 -and $b[3] -eq 0) {
              throw "$f is UTF-16 encoded. pip can't parse it. Re-save as UTF-8."
            }
          }
          python -c "import numpy, scipy, librosa, soundfile, resampy, send2trash, threadpoolctl; print('deps installed OK')"

      - name: 依存バージョン記録
        run: pip freeze > build-manifest.txt

      - name: ビルド（spec 経由）
        run: pyinstaller DSRE.spec --clean --noconfirm

      - name: スモークテスト（必須依存の同梱確認）
        shell: pwsh
        run: |
          $dist = "dist/DSRE"
          # ディレクトリとして存在すべき依存 (パッケージ形式)
          $dirs = @("_internal/numpy", "_internal/scipy", "_internal/librosa",
                    "_internal/numba", "_internal/llvmlite", "_internal/resampy",
                    "_internal/PySide6")
          foreach ($r in $dirs) {
            $p = Join-Path $dist $r
            if (-not (Test-Path $p -PathType Container)) { throw "MISSING dir: $p" }
          }
          # ファイルとして存在すべき単一モジュール依存
          $files = @("DSRE.exe")
          foreach ($r in $files) {
            $p = Join-Path $dist $r
            if (-not (Test-Path $p -PathType Leaf)) { throw "MISSING file: $p" }
          }
          # soundfile は単一モジュール: soundfile.py または _soundfile*.pyd / libsndfile*.dll
          $sfOk = @(Get-ChildItem -Path "$dist/_internal" -Filter "soundfile*" -ErrorAction SilentlyContinue).Count +
                  @(Get-ChildItem -Path "$dist/_internal" -Filter "_soundfile*" -ErrorAction SilentlyContinue).Count +
                  @(Get-ChildItem -Path "$dist/_internal" -Filter "libsndfile*" -ErrorAction SilentlyContinue).Count
          if ($sfOk -eq 0) { throw "MISSING: soundfile module / libsndfile DLL" }
          Write-Host "smoke test OK"

      - name: 実起動スモーク (--selftest で import を exercise)
        shell: pwsh
        run: |
          # windowed exe は & 演算子だと detach するので Start-Process -Wait -PassThru で完了待機
          $proc = Start-Process -FilePath "dist\DSRE\DSRE.exe" -ArgumentList "--selftest" -Wait -PassThru
          $code = $proc.ExitCode
          $log = "dist\DSRE\selftest.log"
          if (Test-Path $log) {
            Write-Host "---- selftest.log ----"
            Get-Content $log
            Write-Host "----------------------"
          } else {
            Write-Host "selftest.log not generated"
          }
          if ($code -ne 0) { throw "runtime selftest failed with exit $code" }

      - name: zip 化（_internal + exe を release 直下に配置）
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release | Out-Null
          Copy-Item dist\DSRE\DSRE.exe release\DSRE.exe
          Copy-Item dist\DSRE\_internal release\_internal -Recurse
          Compress-Archive -Path release\* -DestinationPath DSRE_private.zip

      - name: 成果物保存
        uses: actions/upload-artifact@v4
        with:
          name: DSRE_private
          path: |
            DSRE_private.zip
            build-manifest.txt

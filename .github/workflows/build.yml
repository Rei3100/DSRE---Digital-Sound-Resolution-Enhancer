name: Build DSRE (Private)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Python準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 依存インストール
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: EXE作成（_internal付き）
        run: |
          pyinstaller DSRE.py ^
            --noconsole ^
            --name DSRE ^
            --icon=logo.ico ^
            --add-data "logo.ico;." ^
            --collect-all librosa ^
            --collect-all resampy ^
            --collect-all soundfile ^
            --collect-all scipy ^
            --collect-all numpy ^
            --collect-all PySide6

      - name: zip作成（元と同じ構成）
        run: |
          mkdir release
          copy dist\DSRE.exe release\DSRE.exe
          xcopy dist\DSRE release\_internal /E /I
          powershell Compress-Archive -Path release\* -DestinationPath DSRE_custom.zip

      - name: 成果物保存
        uses: actions/upload-artifact@v4
        with:
          name: DSRE_custom
          path: DSRE_custom.zip

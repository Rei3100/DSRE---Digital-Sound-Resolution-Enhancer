name: Build DSRE Private

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Python準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 依存インストール
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: ビルド（onedir）
        run: pyinstaller DSRE.py --noconsole --onedir --name DSRE --icon=logo.ico --add-data "logo.ico;." --contents-directory _internal

      - name: zip化（元と同じ構造）
        run: |
          mkdir release
          copy dist\DSRE\DSRE.exe release\DSRE.exe
          xcopy dist\DSRE\_internal release\_internal /E /I
          powershell Compress-Archive -Path release\* -DestinationPath DSRE_private.zip

      - name: 成果物保存
        uses: actions/upload-artifact@v4
        with:
          name: DSRE_private
          path: DSRE_private.zip
